name: Vyrion CI Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BASE_URL: ${{ vars.BASE_URL || 'https://vyrion.earth' }}

jobs:
  architecture-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run CI gates
        run: node scripts/ci/run-gates.mjs
