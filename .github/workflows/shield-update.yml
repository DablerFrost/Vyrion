# ════════════════════════════════════════════════════════════════════════
# VYRION · SHIELD · Hazard Intelligence Refresh
# File: .github/workflows/shield-update.yml
#
# Purpose:
#   Fetches live planetary hazard intelligence feeds:
#
#   • USGS M4.5+ Seismic Activity
#   • NASA EONET Hazard Events
#
#   Computes VYRION SHIELD threat scoring via
#   algorithm v1.1.
#
# Reliability:
#   • Falls back to previous snapshot on API failure
#   • Never writes empty datasets
#   • Commits only validated changes
#
# Output:
#   data/shield-snapshot.json
#
# Runtime:
#   Node.js 22 LTS
#   GitHub Actions Node24-compatible
#
# ════════════════════════════════════════════════════════════════════════

name: VYRION · SHIELD · Hazard Intelligence Refresh

on:
  schedule:
    # 00:10 UTC — after CONSCIENCE refresh
    - cron: "10 0 * * *"

    # 12:10 UTC — midday hazard refresh
    - cron: "10 12 * * *"

  workflow_dispatch:

# Prevent overlapping SHIELD executions
concurrency:
  group: vyrion-shield-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_ENV: production

  # GitHub Actions future-proofing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    name: VYRION · SHIELD · Hazard Intelligence Refresh

    runs-on: ubuntu-latest

    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:

      # ─────────────────────────────────────────────
      # Checkout Repository
      # ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # Setup Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ─────────────────────────────────────────────
      # Install Dependencies
      # ─────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            echo "Detected package-lock.json"
            npm ci
          else
            echo "No lockfile found — using npm install"
            npm install
          fi

      # ─────────────────────────────────────────────
      # Verify Runtime
      # ─────────────────────────────────────────────
      - name: Verify Runtime
        run: |
          set -euo pipefail

          echo "Node Version:"
          node --version

          echo "NPM Version:"
          npm --version

      # ─────────────────────────────────────────────
      # Fetch SHIELD Hazard Feeds
      #
      # Sources:
      #   • USGS Earthquake Hazards
      #   • NASA EONET Hazard Events
      #
      # Logic:
      #   • Never writes empty snapshots
      #   • Falls back to previous snapshot
      #   • Exits only if total failure occurs
      # ─────────────────────────────────────────────
      - name: Fetch SHIELD Hazard Feeds
        run: |
          set -euo pipefail
          node scripts/fetch-shield-data.js

      # ─────────────────────────────────────────────
      # Validate Snapshot Exists
      # ─────────────────────────────────────────────
      - name: Validate SHIELD Snapshot
        run: |
          set -euo pipefail

          if [ ! -f data/shield-snapshot.json ]; then
            echo "ERROR: shield-snapshot.json missing"
            exit 1
          fi

          if [ ! -s data/shield-snapshot.json ]; then
            echo "ERROR: shield-snapshot.json empty"
            exit 1
          fi

          echo "Snapshot validation passed."

      # ─────────────────────────────────────────────
      # Upload Artifact Snapshot
      # ─────────────────────────────────────────────
      - name: Upload SHIELD Snapshot
        uses: actions/upload-artifact@v4
        with:
          name: shield-snapshot
          path: data/shield-snapshot.json
          retention-days: 30

      # ─────────────────────────────────────────────
      # Commit Updated Snapshot
      # ─────────────────────────────────────────────
      - name: Commit SHIELD Refresh
        run: |
          set -euo pipefail

          git config user.name "VYRION Data Bot"
          git config user.email "data-bot@vyrion.earth"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git add data/shield-snapshot.json

          # Exit cleanly if nothing changed
          if git diff --staged --quiet; then
            echo "shield-snapshot.json unchanged — no commit required."
            exit 0
          fi

          git commit -m "vyrion[shield]: hazard refresh ${TIMESTAMP}"

          # Sync safely with latest remote state
          git pull --rebase origin main

          git push origin HEAD:main

          echo "SHIELD snapshot committed successfully."

      # ─────────────────────────────────────────────
      # Workflow Complete
      # ─────────────────────────────────────────────
      - name: Workflow Complete
        run: |
          echo "VYRION SHIELD refresh completed successfully."
