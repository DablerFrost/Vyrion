# ══════════════════════════════════════════════════════════════════
#  VYRION · CONSCIENCE · Daily Intelligence Refresh
#  File: .github/workflows/conscience-daily.yml
#
#  Schedule: 00:05 UTC daily
#  Function: Fetches NOAA CO₂, SEC EDGAR (11 companies),
#            Open-Meteo ERA5, NSIDC Ice, NOAA OISST, NASA EONET,
#            GBIF biodiversity — computes daily VYRION Index.
#            Validates schema before committing. Blocks bad data.
#
#  Output:   conscience-data.json (repo root)
#  Validate: scripts/validate-schema.js (pre-commit gate)
#
#  VYRION PBC · Tyler Frost / DablerFrost · Hilo, Hawaii
#  github.com/DablerFrost/Vyrion · contact@vyrion.earth
# ══════════════════════════════════════════════════════════════════

name: VYRION · CONSCIENCE · Daily Intelligence Refresh

on:
  schedule:
    # 00:05 UTC daily — after midnight UTC, before SHIELD at 00:10
    - cron: '5 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    name: VYRION · CONSCIENCE · Intelligence Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # ── Step 1: Checkout ────────────────────────────────────────
      - name: VYRION · Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Node.js 20 ──────────────────────────────────────
      - name: VYRION · Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 3: Fetch all CONSCIENCE intelligence feeds ─────────
      - name: VYRION · Fetch CONSCIENCE Intelligence Feeds
        run: node scripts/fetch-conscience-data.js
        env:
          NODE_ENV: production

      # ── Step 4: Validate schema — pre-commit gate ────────────────
      #    Runs validate-schema.js against the freshly generated
      #    conscience-data.json. Exits 1 on schema errors — blocks
      #    the commit. Warnings are logged but not blocking.
      - name: VYRION · Validate CONSCIENCE Schema
        run: node scripts/validate-schema.js

      # ── Step 5: Commit and push if data changed ──────────────────
      - name: VYRION · Commit Intelligence Refresh
        run: |
          git config user.name  "VYRION Data Bot"
          git config user.email "data-bot@vyrion.earth"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git add conscience-data.json

          # Only commit if file actually changed
          if git diff --staged --quiet; then
            echo "conscience-data.json unchanged — no commit needed."
          else
            git commit -m "vyrion[conscience]: intelligence refresh ${TIMESTAMP}"
            git push
            echo "conscience-data.json committed and pushed at ${TIMESTAMP}"
          fi
