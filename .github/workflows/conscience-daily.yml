# ══════════════════════════════════════════════════════════════════
#  VYRION · CONSCIENCE · Daily Intelligence Refresh
#  File: .github/workflows/conscience-daily.yml
#
#  Schedule:
#    Daily at 00:05 UTC
#
#  Purpose:
#    Fetches planetary intelligence datasets and computes the
#    VYRION CONSCIENCE index.
#
#  Data Sources:
#    - NOAA CO₂
#    - SEC EDGAR
#    - Open-Meteo ERA5
#    - NSIDC Ice
#    - NOAA OISST
#    - NASA EONET
#    - GBIF Biodiversity
#
#  Outputs:
#    conscience-data.json
#
#  Validation:
#    scripts/validate-schema.js
#
#  Repository:
#    github.com/DablerFrost/Vyrion
#
# ══════════════════════════════════════════════════════════════════

name: VYRION · CONSCIENCE · Daily Intelligence Refresh

on:
  schedule:
    # 00:05 UTC daily
    - cron: '5 0 * * *'

  workflow_dispatch:

# Prevent overlapping executions
concurrency:
  group: conscience-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    name: VYRION · CONSCIENCE · Intelligence Refresh

    runs-on: ubuntu-latest

    timeout-minutes: 15

    env:
      NODE_ENV: production
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      # ──────────────────────────────────────────────────────────
      # Checkout Repository
      # ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────
      # Setup Node.js
      # ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ──────────────────────────────────────────────────────────
      # Install Dependencies
      # ──────────────────────────────────────────────────────────
      # Uses npm install instead of npm ci to avoid failures
      # if package-lock.json does not exist yet.
      # ──────────────────────────────────────────────────────────
      - name: Install Dependencies
        run: npm install

      # ──────────────────────────────────────────────────────────
      # Verify Runtime
      # ──────────────────────────────────────────────────────────
      - name: Verify Node Runtime
        run: |
          echo "Node Version:"
          node --version

          echo "NPM Version:"
          npm --version

      # ──────────────────────────────────────────────────────────
      # Fetch Intelligence Feeds
      # ──────────────────────────────────────────────────────────
      - name: Fetch CONSCIENCE Intelligence Feeds
        run: node scripts/fetch-conscience-data.js

      # ──────────────────────────────────────────────────────────
      # Validate Generated Schema
      # Blocks commit if schema fails validation
      # ──────────────────────────────────────────────────────────
      - name: Validate CONSCIENCE Schema
        run: node scripts/validate-schema.js

      # ──────────────────────────────────────────────────────────
      # Commit Updated Data
      # ──────────────────────────────────────────────────────────
      - name: Commit Updated Intelligence Snapshot
        run: |

          git config user.name "VYRION Data Bot"
          git config user.email "data-bot@vyrion.earth"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git add conscience-data.json

          # Exit early if nothing changed
          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "vyrion[conscience]: intelligence refresh ${TIMESTAMP}"

          # Sync latest remote changes safely
          git pull --rebase --autostash origin main || true

          # Push latest snapshot
          git push origin HEAD:main

          echo "CONSCIENCE snapshot committed successfully."

      # ──────────────────────────────────────────────────────────
      # Workflow Complete
      # ──────────────────────────────────────────────────────────
      - name: Workflow Complete
        run: |
          echo "VYRION CONSCIENCE refresh completed successfully."
