# ════════════════════════════════════════════════════════════════════════
# VYRION · CONSCIENCE · Daily Intelligence Refresh
# File: .github/workflows/conscience-daily.yml
#
# Purpose:
#   Fetches planetary intelligence datasets and computes the
#   VYRION CONSCIENCE index.
#
# Schedule:
#   Daily at 00:05 UTC
#
# Outputs:
#   data/conscience-data.json
#
# Runtime:
#   Node.js 22 LTS
#   GitHub Actions Node24-compatible
#
# ════════════════════════════════════════════════════════════════════════

name: VYRION · CONSCIENCE · Daily Intelligence Refresh

on:
  schedule:
    - cron: "5 0 * * *"

  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: vyrion-conscience-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_ENV: production

  # GitHub Actions future-proofing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    name: VYRION · CONSCIENCE · Intelligence Refresh

    runs-on: ubuntu-latest

    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:

      # ─────────────────────────────────────────────
      # Checkout Repository
      # ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # Setup Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ─────────────────────────────────────────────
      # Install Dependencies
      # ─────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          set -euo pipefail

          if [ -f package-lock.json ]; then
            echo "Detected package-lock.json"
            npm ci
          else
            echo "No lockfile found — using npm install"
            npm install
          fi

      # ─────────────────────────────────────────────
      # Verify Runtime
      # ─────────────────────────────────────────────
      - name: Verify Runtime
        run: |
          set -euo pipefail

          echo "Node Version:"
          node --version

          echo "NPM Version:"
          npm --version

      # ─────────────────────────────────────────────
      # Fetch Intelligence Feeds
      # ─────────────────────────────────────────────
      - name: Fetch CONSCIENCE Intelligence Feeds
        run: |
          set -euo pipefail
          node scripts/fetch-conscience-data.mjs

      # ─────────────────────────────────────────────
      # Validate Output Schema
      # ─────────────────────────────────────────────
      - name: Validate CONSCIENCE Schema
        run: |
          set -euo pipefail
          node scripts/validate-schema.js

      # ─────────────────────────────────────────────
      # Upload Artifact Snapshot
      # ─────────────────────────────────────────────
      - name: Upload Intelligence Snapshot
        uses: actions/upload-artifact@v4
        with:
          name: conscience-data
          path: data/conscience-data.json
          retention-days: 30

      # ─────────────────────────────────────────────
      # Commit Updated Snapshot
      # ─────────────────────────────────────────────
      - name: Commit Updated Intelligence Snapshot
        run: |
          set -euo pipefail

          git config user.name "VYRION Data Bot"
          git config user.email "data-bot@vyrion.earth"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          git add data/conscience-data.json

          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "vyrion[conscience]: intelligence refresh ${TIMESTAMP}"

          # Rebase safely against latest main
          git pull --rebase origin main

          git push origin HEAD:main

          echo "CONSCIENCE snapshot committed successfully."

      # ─────────────────────────────────────────────
      # Completion
      # ─────────────────────────────────────────────
      - name: Workflow Complete
        run: |
          echo "VYRION CONSCIENCE refresh completed successfully."
